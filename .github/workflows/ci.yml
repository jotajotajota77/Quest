name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        # Valores dummy: o build não acessa Supabase/Spotify, só precisa que as
        # NEXT_PUBLIC_* existam para compilar. Segredos reais vivem na Vercel.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          NEXT_PUBLIC_SPOTIFY_CLIENT_ID: dummy-client-id
          SPOTIFY_REDIRECT_URI: http://localhost:3000/api/spotify/callback
        run: npm run build
